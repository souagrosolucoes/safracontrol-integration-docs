<!DOCTYPE html>
<html>
  <head>
    <title>SafraControl API — Documentação de Integração</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; font-family: Roboto, sans-serif; }

      /* ── Top nav ── */
      #topnav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        background: #0055aa;
        display: flex;
        align-items: center;
        padding: 0 24px;
        z-index: 10000;
        gap: 0;
        box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      }
      #topnav .brand {
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: #fff;
        text-decoration: none;
        margin-right: 32px;
        white-space: nowrap;
        letter-spacing: 0.3px;
      }
      #topnav .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
      }
      #topnav a.nav-item {
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 13.5px;
        padding: 6px 12px;
        border-radius: 4px;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }
      #topnav a.nav-item:hover,
      #topnav a.nav-item.active {
        background: rgba(255,255,255,0.18);
        color: #fff;
      }
      .nav-separator {
        width: 1px;
        height: 20px;
        background: rgba(255,255,255,0.25);
        margin: 0 8px;
      }
      .nav-badge {
        display: inline-block;
        background: #27ae60;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 10px;
        margin-left: 5px;
        vertical-align: middle;
        letter-spacing: 0.4px;
      }

      /* ── Redoc container ── */
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Roboto, sans-serif;
        color: #666;
        flex-direction: column;
        gap: 12px;
        padding-top: 52px;
      }
      #error {
        display: none;
        padding: 40px;
        font-family: Roboto, sans-serif;
        color: #c0392b;
        background: #fdf2f2;
        border-left: 4px solid #c0392b;
        margin: 60px 40px 40px;
        border-radius: 4px;
      }
      #redoc-container {
        padding-top: 52px;
      }
    </style>
  </head>
  <body>

    <nav id="topnav">
      <a class="brand" href="index.html">SafraControl Integração</a>
      <div class="nav-links">
        <a class="nav-item active" href="index.html">Referência da API</a>
        <div class="nav-separator"></div>
        <a class="nav-item" href="docs/fluxos/criacao-pedido.html">
          Fluxo: Criação de Pedido <span class="nav-badge">GUIA</span>
        </a>
      </div>
    </nav>

    <div id="loading">
      <span>Carregando documentação...</span>
    </div>
    <div id="error"></div>
    <div id="redoc-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/redoc/bundles/redoc.standalone.js"></script>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const specUrl = params.get("spec");
        const DEFAULT_SPEC = "https://safracontrol.api.stg.services.souagrosolucoes.com.br/integration/api-json";
        const urlToLoad = specUrl || DEFAULT_SPEC;

        function isValidSpec(url) {
          if (!url) return false;
          if (url.startsWith("http://") || url.startsWith("https://")) return true;
          if (url.startsWith("./") || url.startsWith("/")) return true;
          return false;
        }

        if (specUrl && !isValidSpec(specUrl)) {
          document.getElementById("loading").style.display = "none";
          const err = document.getElementById("error");
          err.style.display = "block";
          err.textContent = "URL de spec inválida: " + specUrl;
          return;
        }

        Redoc.init(
          urlToLoad,
          {
            theme: {
              colors: {
                primary: { main: "#0066cc" },
              },
              typography: {
                fontFamily: "Roboto, sans-serif",
                headingsFamily: "Montserrat, sans-serif",
              },
            },
            scrollYOffset: 60,
            hideDownloadButton: false,
          },
          document.getElementById("redoc-container"),
          function () {
            document.getElementById("loading").style.display = "none";
          }
        );
      })();
    </script>
  </body>
</html>
